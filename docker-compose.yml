version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hykero-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - API_KEY=${API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173,http://127.0.0.1:5173}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      # Mount only the database file location, not all of data/
      # This prevents overriding pre-built model artifacts inside the container.
      - hykero-db:/app/data/db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_API_KEY=${VITE_API_KEY:-}
    container_name: hykero-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  hykero-db:
